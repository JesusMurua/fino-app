<button
  class="product-card"
  [class.product-card--unavailable]="!product.isAvailable"
  [class.product-card--list]="viewMode === 'list'"
  type="button"
  [attr.aria-label]="'Agregar ' + product.name"
  [disabled]="!product.isAvailable"
  (click)="selected.emit(product)"
>
  <!-- Image section (60% of card) -->
  <div class="product-card__image">
    @if (product.imageUrl) {
      <img [src]="product.imageUrl" [alt]="product.name" loading="lazy" />
    } @else if (product.images?.length) {
      <img [src]="product.images[0].url" [alt]="product.name" loading="lazy" />
    } @else {
      <div class="product-card__image-fallback">
        <i class="pi pi-shopping-bag"></i>
      </div>
    }

    <!-- Popular badge -->
    @if (product.isPopular && product.isAvailable) {
      <span class="product-card__badge">Popular</span>
    }

    <!-- Low stock badge -->
    @if (product.trackStock && product.isAvailable && isLowStock) {
      <span class="product-card__badge product-card__badge--stock">
        Quedan {{ product.currentStock }}
      </span>
    }
  </div>

  <!-- Info section -->
  <div class="product-card__body">
    <span class="product-card__name">{{ product.name }}</span>
    @if (product.description) {
      <span class="product-card__desc">{{ product.description }}</span>
    }
    <div class="product-card__footer">
      <span class="product-card__price">{{ product.priceCents | price }}</span>
      <span class="product-card__add-icon">
        <i class="pi pi-plus"></i>
      </span>
    </div>
  </div>

  <!-- Out-of-stock overlay -->
  @if (!product.isAvailable) {
    <div class="product-card__overlay">
      <span class="product-card__overlay-text">Agotado</span>
    </div>
  }
</button>
