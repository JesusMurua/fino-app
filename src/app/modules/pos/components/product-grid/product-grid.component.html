<p-toast />

<!-- POS Layout: 3-column grid (Sidebar | Center | Cart) -->
<div class="pos-layout">

  <!-- LEFT SIDEBAR: Vertical category navigation -->
  <app-category-sidebar
    [categories]="categories()"
    [selectedCategoryId]="selectedCategoryId()"
    (categorySelected)="selectCategory($event)"
  />

  <!-- CENTER STAGE: Header + Products -->
  <div class="pos-center">

    <!-- Transparent header -->
    <app-pos-header />

    <!-- Product Grid (scrollable) -->
    <main class="pos-products" aria-label="Productos">

      @for (product of filteredProducts(); track product.id) {
        @defer (on viewport) {
          <app-product-card
            [product]="product"
            (selected)="onProductSelected($event)"
          />
        } @placeholder {
          <div class="product-card-placeholder"></div>
        }
      } @empty {
        @if (!isLoading()) {
          <div class="pos-empty">
            <i class="pi pi-inbox"></i>
            <p>No hay productos en esta categoría</p>
          </div>
        }
      }

    </main>

  </div>

  <!-- RIGHT PANE: Cart Panel -->
  <div class="pos-right-pane">
    <app-cart-panel />
  </div>

  <!-- Delivery panel (global overlay, only when hasDelivery) -->
  @if (configService.hasDelivery()) {
    <app-delivery-panel />
  }

</div>
