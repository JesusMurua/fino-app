<p-toast />

<!-- POS Layout: Sidebar-first grid -->
<div class="pos-layout">

  <!-- LEFT PANE: Header + Categories + Products -->
  <div class="pos-left-pane">

    <!-- Integrated header -->
    <app-pos-header />

    <!-- Category Filter Bar -->
    <nav class="pos-category-bar" aria-label="Categorías">
      <button
        type="button"
        class="cat-pill"
        [class.cat-pill--active]="selectedCategoryId() === null"
        (click)="selectCategory(null)"
      >
        <i class="pi pi-list"></i>
        <span>Todos</span>
      </button>

      @for (cat of categories(); track cat.id) {
        <button
          type="button"
          class="cat-pill"
          [class.cat-pill--active]="selectedCategoryId() === cat.id"
          (click)="selectCategory(cat.id)"
        >
          @if (cat.icon) {
            <i class="pi {{ cat.icon }}"></i>
          }
          <span>{{ cat.name }}</span>
        </button>
      }
    </nav>

    <!-- Product Grid (scrollable) -->
    <main class="pos-products" aria-label="Productos">

      @for (product of filteredProducts(); track product.id) {
        @defer (on viewport) {
          <app-product-card
            [product]="product"
            (selected)="onProductSelected($event)"
          />
        } @placeholder {
          <div class="product-card-placeholder"></div>
        }
      } @empty {
        @if (!isLoading()) {
          <div class="pos-empty">
            <i class="pi pi-inbox"></i>
            <p>No hay productos en esta categoría</p>
          </div>
        }
      }

    </main>

  </div>

  <!-- RIGHT PANE: Cart Panel -->
  <div class="pos-right-pane">
    <app-cart-panel />
  </div>

  <!-- Delivery panel (global overlay, only when hasDelivery) -->
  @if (configService.hasDelivery()) {
    <app-delivery-panel />
  }

</div>
