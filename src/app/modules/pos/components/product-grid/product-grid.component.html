<p-toast />

<!-- POS Layout: 3-column grid (Sidebar | Center | Cart) -->
<div class="pos-layout">

  <!-- LEFT SIDEBAR: Vertical category navigation -->
  <app-category-sidebar
    [categories]="categories()"
    [selectedCategoryId]="selectedCategoryId()"
    (categorySelected)="selectCategory($event)"
  />

  <!-- CENTER STAGE: Header + Products -->
  <div class="pos-center">

    <!-- Transparent header -->
    <app-pos-header />

    <!-- View-mode toolbar (Grid / List toggle) -->
    <div class="pos-toolbar" role="toolbar" aria-label="Vista del catálogo">
      <div class="view-toggle" role="group" aria-label="Cambiar vista">
        <button
          type="button"
          class="view-toggle__btn"
          [class.view-toggle__btn--active]="viewMode() === 'grid'"
          [attr.aria-pressed]="viewMode() === 'grid'"
          aria-label="Vista de cuadrícula"
          (click)="setViewMode('grid')"
        >
          <i class="pi pi-th-large"></i>
        </button>
        <button
          type="button"
          class="view-toggle__btn"
          [class.view-toggle__btn--active]="viewMode() === 'list'"
          [attr.aria-pressed]="viewMode() === 'list'"
          aria-label="Vista de lista"
          (click)="setViewMode('list')"
        >
          <i class="pi pi-list"></i>
        </button>
      </div>
    </div>

    <!-- Product Grid (scrollable) -->
    <main
      class="pos-products"
      [class.pos-products--list]="viewMode() === 'list'"
      aria-label="Productos"
    >

      @for (product of filteredProducts(); track product.id) {
        @defer (on viewport) {
          <app-product-card
            [product]="product"
            [viewMode]="viewMode()"
            (selected)="onProductSelected($event)"
          />
        } @placeholder {
          <div
            class="product-card-placeholder"
            [class.product-card-placeholder--list]="viewMode() === 'list'"
          ></div>
        }
      } @empty {
        @if (!isLoading()) {
          <div class="pos-empty">
            <i class="pi pi-inbox"></i>
            <p>No hay productos en esta categoría</p>
          </div>
        }
      }

    </main>

  </div>

  <!-- RIGHT PANE: Cart Panel -->
  <div class="pos-right-pane">
    <app-cart-panel />
  </div>

  <!-- Delivery panel (global overlay, only when hasDelivery) -->
  @if (configService.hasDelivery()) {
    <app-delivery-panel />
  }

</div>
