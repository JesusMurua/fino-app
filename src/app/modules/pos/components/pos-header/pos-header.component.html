<header class="pos-header">

  <!-- Brand: logo + business name + location -->
  <div class="pos-header__brand">
    <div class="pos-header__logo" aria-hidden="true">
      <i class="pi pi-home"></i>
    </div>
    <div class="pos-header__info">
      <span class="pos-header__name">{{ branchName() }}</span>
      <span class="pos-header__location">{{ userName() }} · {{ userRoleLabel() }}</span>
    </div>
  </div>

  <!-- Right side: order number + connection status + settings -->
  <div class="pos-header__right">
    <div
      class="pos-header__status"
      [class.pos-header__status--online]="isOnline()"
      [class.pos-header__status--offline]="!isOnline()"
      [attr.aria-label]="isOnline() ? 'Conectado' : 'Sin conexión'"
    >
      <span class="pos-header__status-dot"></span>
      <span class="pos-header__status-label">{{ isOnline() ? 'En línea' : 'Sin conexión' }}</span>
    </div>

    @if (showStockButton) {
      <button
        type="button"
        class="pos-header__settings"
        aria-label="Recibir mercancía"
        pTooltip="Recibir mercancía"
        tooltipPosition="bottom"
        (click)="openStockDialog()"
      >
        <i class="pi pi-box"></i>
      </button>
    }

    @if (showOrdersButton) {
      <button
        type="button"
        class="pos-header__settings"
        aria-label="Ver mesas"
        (click)="openTables()"
      >
        <i class="pi pi-table"></i>
      </button>
      <button
        type="button"
        class="pos-header__settings"
        aria-label="Ver órdenes activas"
        (click)="openOrders()"
      >
        <i class="pi pi-receipt"></i>
      </button>
    }

    <button
      type="button"
      class="pos-header__settings"
      aria-label="Acceder al back office"
      (click)="openAdmin()"
    >
      <i class="pi pi-cog"></i>
    </button>
  </div>

</header>

<!-- Kiosk mode warning banner -->
@if (deviceConfig().mode === 'kiosk') {
  <div class="pos-header__kiosk-banner" role="alert">
    <i class="pi pi-exclamation-triangle"></i>
    <span>
      Este dispositivo está configurado como <strong>Kiosko</strong>.
    </span>
    <a routerLink="/kiosk/welcome" class="pos-header__kiosk-link">
      Ir al kiosko →
    </a>
  </div>
}

<!-- Stock receive dialog -->
<p-dialog
  header="Recibir mercancía"
  [visible]="showStockDialog()"
  (visibleChange)="showStockDialog.set($event)"
  [modal]="true"
  [closable]="true"
  [style]="{ width: '420px' }"
  [draggable]="false"
>
  <div class="stock-form">
    <div class="stock-form__field">
      <label class="stock-form__label">Insumo o producto</label>
      <p-dropdown
        [options]="stockItems()"
        optionLabel="label"
        optionValue="value"
        [(ngModel)]="selectedStockItem"
        placeholder="Seleccionar..."
        styleClass="w-full"
        [filter]="true"
        filterPlaceholder="Buscar..."
        [appendTo]="'body'"
      />
    </div>

    <div class="stock-form__field">
      <label class="stock-form__label">Cantidad</label>
      <p-inputNumber
        [(ngModel)]="stockQuantity"
        [min]="1"
        styleClass="w-full"
      />
    </div>

    <div class="stock-form__field">
      <label class="stock-form__label">Motivo (opcional)</label>
      <input
        type="text"
        pInputText
        [(ngModel)]="stockReason"
        placeholder="Ej. Compra proveedor"
        class="w-full"
      />
    </div>
  </div>

  <ng-template pTemplate="footer">
    <button type="button" class="pos-header__btn-ghost" (click)="showStockDialog.set(false)">Cancelar</button>
    <button
      type="button"
      class="pos-header__btn-primary"
      [disabled]="!selectedStockItem || stockQuantity <= 0"
      (click)="confirmStockReceive()"
    >
      <i class="pi pi-plus"></i>
      Registrar entrada
    </button>
  </ng-template>
</p-dialog>
