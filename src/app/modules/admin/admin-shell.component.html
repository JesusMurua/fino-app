<p-toast />
<div class="shell" [class.shell--collapsed]="isCollapsed()">

  <!-- ================================================================== -->
  <!-- SIDEBAR                                                             -->
  <!-- ================================================================== -->
  <aside class="sidebar">

    <!-- Brand -->
    <div class="sidebar__brand">
      <div class="sidebar__logo" aria-hidden="true">
        <i class="pi pi-home"></i>
      </div>
      @if (!isCollapsed()) {
        <span class="sidebar__title">Back Office</span>
      }
    </div>

    <div class="sidebar__divider"></div>

    <!-- Branch Selector -->
    @if (canSwitchBranch()) {
      <div class="sidebar__branch">
        @if (!isCollapsed()) {
          <span class="sidebar__branch-label">Sucursal activa</span>
          <p-dropdown
            [options]="authService.availableBranches()"
            optionLabel="name"
            optionValue="id"
            [(ngModel)]="selectedBranchId"
            (onChange)="changeBranch($event.value)"
            styleClass="w-full"
            [disabled]="isSwitchingBranch()"
          />
        } @else {
          <button
            type="button"
            class="sidebar__branch-icon"
            [pTooltip]="currentBranchName()"
            tooltipPosition="right"
          >
            <i class="pi pi-building"></i>
          </button>
        }
      </div>

      <div class="sidebar__divider"></div>
    }

    <!-- Navigation -->
    <nav class="sidebar__nav" aria-label="Navegación del back office">
      @for (item of navItems; track item.path) {
        <a
          class="nav-item"
          [routerLink]="item.path"
          routerLinkActive="nav-item--active"
          [pTooltip]="isCollapsed() ? item.label : ''"
          tooltipPosition="right"
        >
          <i [class]="'pi ' + item.icon + ' nav-item__icon'"></i>
          @if (!isCollapsed()) {
            <span class="nav-item__label">{{ item.label }}</span>
          }
          @if (item.badge && lowStockCount() > 0) {
            <span class="nav-item__badge">{{ lowStockCount() }}</span>
          }
        </a>
      }
    </nav>

    <!-- Toggle button at bottom -->
    <button
      type="button"
      class="sidebar__toggle"
      (click)="toggleSidebar()"
      [attr.aria-label]="isCollapsed() ? 'Expandir menú' : 'Colapsar menú'"
    >
      <i [class]="isCollapsed() ? 'pi pi-chevron-right' : 'pi pi-chevron-left'"></i>
    </button>

  </aside>

  <!-- ================================================================== -->
  <!-- MAIN AREA (top bar + content)                                       -->
  <!-- ================================================================== -->
  <div class="main">

    <!-- Top bar -->
    <header class="topbar">
      <div class="topbar__actions">
        <button type="button" class="topbar__btn" (click)="goToPos()">
          <i class="pi pi-arrow-left"></i>
          <span>Ir al POS</span>
        </button>
        <button type="button" class="topbar__btn topbar__btn--logout" (click)="logout()">
          <i class="pi pi-sign-out"></i>
          <span>Cerrar sesión</span>
        </button>
      </div>
    </header>

    <!-- Page content -->
    <main class="content">
      <router-outlet />
    </main>

  </div>

</div>
