<div class="invoicing-page layout-standard">

  <!-- Header -->
  <div class="page-header">
    <div class="page-header__info">
      <h1 class="page-header__title">Facturación Global</h1>
      <p class="page-header__subtitle">Genera facturas CFDI para ventas sin facturar</p>
    </div>
    <div class="page-header__actions">
      <p-calendar
        [(ngModel)]="dateRange"
        selectionMode="range"
        [readonlyInput]="true"
        dateFormat="dd/mm/yy"
        placeholder="Selecciona periodo"
        [showIcon]="true"
        [maxDate]="dateRange[1]"
        styleClass="invoicing-calendar"
      />
    </div>
  </div>

  <!-- CTA -->
  <div class="invoicing-cta">
    <button
      type="button"
      class="invoicing-cta__btn"
      [disabled]="isGenerating()"
      (click)="onGenerateGlobal()"
    >
      @if (isGenerating()) {
        <i class="pi pi-spin pi-spinner"></i>
        Generando...
      } @else {
        <i class="pi pi-file-edit"></i>
        Generar Factura Global
      }
    </button>
  </div>

</div>
