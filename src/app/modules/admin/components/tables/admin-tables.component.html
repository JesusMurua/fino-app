<div class="admin-tables">

  <!-- Header -->
  <div class="admin-tables__header">
    <h1 class="admin-tables__title">Configuración de Mesas</h1>
    <button type="button" class="btn-primary" (click)="openNewDialog()">
      <i class="pi pi-plus"></i>
      Nueva mesa
    </button>
  </div>

  <!-- Table -->
  <div class="admin-tables__wrap">
    <p-table
      [value]="tables()"
      [loading]="loading()"
      [rowHover]="true"
      dataKey="id"
      styleClass="p-datatable-sm"
    >
      <ng-template pTemplate="header">
        <tr>
          <th style="min-width: 14rem">Nombre</th>
          <th style="min-width: 8rem">Capacidad</th>
          <th style="min-width: 8rem">Estado</th>
          <th style="min-width: 6rem">Activa</th>
          <th style="min-width: 5rem">Acciones</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-table>
        <tr>
          <td class="admin-tables__name">{{ table.name }}</td>
          <td class="admin-tables__capacity">
            {{ table.capacity ? table.capacity + ' personas' : '—' }}
          </td>
          <td>
            @if (table.status === 'available') {
              <span class="status-badge status-badge--green">Disponible</span>
            } @else {
              <span class="status-badge status-badge--red">Ocupada</span>
            }
          </td>
          <td>
            <p-inputSwitch
              [ngModel]="table.isActive"
              (onChange)="onToggleTable(table)"
            />
          </td>
          <td>
            <button
              type="button"
              class="btn-icon"
              aria-label="Editar mesa"
              (click)="openEditDialog(table)"
            >
              <i class="pi pi-pencil"></i>
            </button>
          </td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="5" class="admin-tables__empty">
            No hay mesas configuradas. Agrega tu primera mesa para comenzar.
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>

</div>

<!-- Create / Edit dialog -->
<p-dialog
  [header]="editingTable() ? 'Editar mesa' : 'Nueva mesa'"
  [visible]="showDialog()"
  (visibleChange)="showDialog.set($event)"
  [modal]="true"
  [closable]="true"
  [style]="{ width: '380px' }"
  [draggable]="false"
>
  <div class="table-form">
    <div class="form-field">
      <label class="form-field__label" for="tf-name">Nombre</label>
      <input
        id="tf-name"
        type="text"
        pInputText
        [(ngModel)]="form.name"
        placeholder="Ej. Mesa 1"
        class="form-field__input"
      />
    </div>

    <div class="form-field">
      <label class="form-field__label" for="tf-capacity">Capacidad (opcional)</label>
      <p-inputNumber
        inputId="tf-capacity"
        [(ngModel)]="form.capacity"
        [min]="1"
        [max]="50"
        placeholder="Ej. 4"
        styleClass="form-field__input"
      />
    </div>

    <div class="form-field form-field--row">
      <label class="form-field__label" for="tf-active">Activa</label>
      <p-inputSwitch inputId="tf-active" [(ngModel)]="form.isActive" />
    </div>
  </div>

  <ng-template pTemplate="footer">
    <button type="button" class="btn-ghost" (click)="showDialog.set(false)">Cancelar</button>
    <button
      type="button"
      class="btn-primary"
      [disabled]="!form.name.trim()"
      (click)="saveTable()"
    >
      Guardar
    </button>
  </ng-template>
</p-dialog>
