<p-dialog
  [visible]="visible"
  (visibleChange)="onClose()"
  [modal]="true"
  [closable]="true"
  [showHeader]="false"
  [style]="{ width: '540px', 'border-radius': '16px' }"
  [contentStyle]="{ padding: '0' }"
  [draggable]="false"
  styleClass="rf-dialog"
>

  <div [formGroup]="form" class="rf">

    <!-- ============================================================ -->
    <!-- Header                                                        -->
    <!-- ============================================================ -->
    <div class="rf__header">
      <div>
        <h2 class="rf__title">{{ reservation ? 'Editar reservación' : 'Nueva reservación' }}</h2>
        <p class="rf__subtitle">Completa los datos para agendar</p>
      </div>
      <button type="button" class="rf__close" (click)="onClose()" aria-label="Cerrar">
        <i class="pi pi-times"></i>
      </button>
    </div>

    <!-- ============================================================ -->
    <!-- Section: Cliente                                               -->
    <!-- ============================================================ -->
    <div class="rf__section">
      <!-- Customer selector (FDD-005) -->
      <div class="rf__customer-selector">
        <app-customer-selector
          [selectedCustomer]="selectedCustomer()"
          (selectedCustomerChange)="selectedCustomer.set($event)"
          (customerChanged)="onCustomerChanged($event)"
          placeholder="Buscar cliente existente..."
        />
      </div>

      <div class="rf__row">
        <div class="rf__field rf__field--grow">
          <app-form-field
            [descriptor]="fieldByKey().get('guestName')!"
            [control]="form.controls['guestName']"
            [formId]="formId"
          />
        </div>
        <div class="rf__field">
          <app-form-field
            [descriptor]="fieldByKey().get('guestPhone')!"
            [control]="form.controls['guestPhone']"
            [formId]="formId"
          />
        </div>
        <div class="rf__field rf__field--party">
          <label class="rf__label" for="rf-partySize">Personas</label>
          <div class="rf__stepper">
            <button type="button" class="rf__stepper-btn"
              (click)="adjustPartySize(-1)"
              [disabled]="form.controls['partySize'].value <= 1">
              <i class="pi pi-minus"></i>
            </button>
            <span class="rf__stepper-val" id="rf-partySize">
              {{ form.controls['partySize'].value }}
            </span>
            <button type="button" class="rf__stepper-btn"
              (click)="adjustPartySize(1)"
              [disabled]="form.controls['partySize'].value >= 50">
              <i class="pi pi-plus"></i>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- ============================================================ -->
    <!-- Section: Cuándo                                               -->
    <!-- ============================================================ -->
    <div class="rf__section">
      <span class="rf__section-tag">Cuándo</span>
      <div class="rf__row">
        <div class="rf__field">
          <label class="rf__label" for="rf-reservationDate">Fecha</label>
          <p-calendar
            inputId="rf-reservationDate"
            formControlName="reservationDate"
            dateFormat="dd/mm/yy"
            [showIcon]="true"
            styleClass="rf__input"
            [appendTo]="'body'"
          />
        </div>
        <div class="rf__field">
          <label class="rf__label" for="rf-reservationTime">Hora</label>
          <p-calendar
            inputId="rf-reservationTime"
            formControlName="reservationTime"
            [timeOnly]="true"
            [hourFormat]="'24'"
            [showIcon]="true"
            styleClass="rf__input"
            [appendTo]="'body'"
          />
        </div>
        <div class="rf__field">
          <app-form-field
            [descriptor]="fieldByKey().get('durationMinutes')!"
            [control]="form.controls['durationMinutes']"
            [formId]="formId"
          />
        </div>
      </div>
    </div>

    <!-- ============================================================ -->
    <!-- Section: Mesa (chip selector via FormWidget)                  -->
    <!-- ============================================================ -->
    <div class="rf__section">
      <span class="rf__section-tag">Mesa</span>

      @if (zoneGroups().length === 0) {
        <p class="rf__empty-tables">No hay mesas configuradas</p>
      } @else if (!noTableAssigned()) {
        <app-form-field
          [descriptor]="fieldByKey().get('tableId')!"
          [control]="form.controls['tableId']"
          [formId]="formId"
        />
      }

      @if (zoneGroups().length > 0) {
        <label class="rf__no-table">
          <input
            type="checkbox"
            [checked]="noTableAssigned()"
            (change)="toggleNoTable()"
          />
          <span>Sin mesa asignada</span>
        </label>
      }
    </div>

    <!-- ============================================================ -->
    <!-- Section: Notas                                                -->
    <!-- ============================================================ -->
    <div class="rf__section rf__section--last">
      <app-form-field
        [descriptor]="fieldByKey().get('notes')!"
        [control]="form.controls['notes']"
        [formId]="formId"
      />
    </div>

  </div>

  <ng-template pTemplate="footer">
    <div class="rf__footer">
      <button type="button" class="rf__btn rf__btn--ghost" (click)="onClose()">Cancelar</button>
      <button
        type="button"
        class="rf__btn rf__btn--primary"
        [disabled]="isSaving()"
        (click)="onSave()"
      >
        @if (isSaving()) {
          <i class="pi pi-spin pi-spinner"></i>
        } @else {
          <i class="pi pi-check"></i>
        }
        {{ reservation ? 'Actualizar' : 'Crear reservación' }}
      </button>
    </div>
  </ng-template>

</p-dialog>
