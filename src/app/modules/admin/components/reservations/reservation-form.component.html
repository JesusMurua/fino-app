<p-dialog
  [header]="reservation ? 'Editar reservación' : 'Nueva reservación'"
  [visible]="visible"
  (visibleChange)="onClose()"
  [modal]="true"
  [closable]="true"
  [style]="{ width: '420px' }"
  [draggable]="false"
>
  <form [formGroup]="form" class="res-form">

    <div class="form-field">
      <label class="form-field__label" for="rf-name">Nombre del cliente</label>
      <input
        formControlName="guestName"
        id="rf-name"
        type="text"
        pInputText
        placeholder="Ej. Juan Pérez"
        class="form-field__input"
      />
      @if (form.get('guestName')?.touched && form.get('guestName')?.hasError('required')) {
        <small class="form-field__error">El nombre es obligatorio</small>
      }
    </div>

    <div class="form-field">
      <label class="form-field__label" for="rf-phone">Teléfono (opcional)</label>
      <input
        formControlName="guestPhone"
        id="rf-phone"
        type="tel"
        pInputText
        placeholder="Ej. 55 1234 5678"
        class="form-field__input"
      />
    </div>

    <div class="form-field">
      <label class="form-field__label" for="rf-party">Personas</label>
      <p-inputNumber
        formControlName="partySize"
        inputId="rf-party"
        [min]="1"
        [max]="50"
        [showButtons]="true"
        styleClass="form-field__input"
      />
    </div>

    <div class="form-row">
      <div class="form-field">
        <label class="form-field__label" for="rf-date">Fecha</label>
        <p-calendar
          formControlName="reservationDate"
          inputId="rf-date"
          dateFormat="dd/mm/yy"
          [showIcon]="true"
          styleClass="form-field__input"
          (onSelect)="checkAvailability()"
        />
      </div>

      <div class="form-field">
        <label class="form-field__label" for="rf-time">Hora</label>
        <p-calendar
          formControlName="reservationTime"
          inputId="rf-time"
          [timeOnly]="true"
          [hourFormat]="'24'"
          [showIcon]="true"
          styleClass="form-field__input"
          (onSelect)="checkAvailability()"
        />
      </div>
    </div>

    <div class="form-field">
      <label class="form-field__label" for="rf-duration">Duración</label>
      <p-dropdown
        formControlName="durationMinutes"
        inputId="rf-duration"
        [options]="durationOptions"
        optionLabel="label"
        optionValue="value"
        styleClass="form-field__input"
        (onChange)="checkAvailability()"
      />
    </div>

    <div class="form-field">
      <label class="form-field__label" for="rf-table">Mesa (opcional)</label>
      <p-dropdown
        formControlName="tableId"
        inputId="rf-table"
        [options]="tables()"
        optionLabel="name"
        optionValue="id"
        placeholder="Sin mesa asignada"
        [showClear]="true"
        styleClass="form-field__input"
        [appendTo]="'body'"
        (onChange)="checkAvailability()"
      />
      @if (availabilityWarning()) {
        <small class="form-field__warning">{{ availabilityWarning() }}</small>
      }
    </div>

    <div class="form-field">
      <label class="form-field__label" for="rf-notes">Notas (opcional)</label>
      <textarea
        formControlName="notes"
        id="rf-notes"
        pInputTextarea
        rows="3"
        placeholder="Ej. Cumpleaños, alergias, silla alta..."
        class="form-field__input"
      ></textarea>
    </div>

  </form>

  <ng-template pTemplate="footer">
    <button type="button" class="btn-ghost" (click)="onClose()">Cancelar</button>
    <button
      type="button"
      class="btn-primary"
      [disabled]="isSaving()"
      (click)="onSave()"
    >
      @if (isSaving()) {
        <i class="pi pi-spin pi-spinner"></i>
      }
      Guardar
    </button>
  </ng-template>
</p-dialog>
